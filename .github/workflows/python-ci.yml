name: Python CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: lint
        run: |
          ruff check .

      - name: format-check
        run: |
          ruff format --check .

      - name: tests
        run: |
          pytest
